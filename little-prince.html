<style>
  :root{ --ink:#33333f; --paper:#efece5; --gold:#e9c66b; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; }
  body{ background:#12121a; font-family:'Cormorant Garamond',Georgia,serif; overflow:hidden; }

  .hero{ width:100vw; height:100vh; height:100dvh;
    background:radial-gradient(78% 80% at 42% 45%, #dedbd6 0%, #cac7c3 55%, #9a9899 100%);
    display:flex; align-items:center; justify-content:center; }
  .hero svg{ width:100%; height:100%; display:block; }

  .stroke{ fill:none; stroke:var(--ink); stroke-width:4; stroke-linecap:round; stroke-linejoin:round; }
  .thin  { fill:none; stroke:var(--ink); stroke-width:2.6; stroke-linecap:round; stroke-linejoin:round; }
  .fillink{ fill:var(--ink); }
  .paper { fill:var(--paper); }
  .title { font-family:'Pirata One',cursive; fill:#2c2c34; font-size:66px; letter-spacing:1px; }

  .star-link{ cursor:pointer; }
  .star-link .hit{ fill:#fff; opacity:0; pointer-events:all; }
  .star-link use{ transition:fill .3s ease, filter .3s ease; }
  .star-link:hover use,
  .star-link:focus-visible use{ fill:var(--gold); filter:drop-shadow(0 0 9px rgba(233,198,107,.95)); }
  .star-link:focus{ outline:none; }

  @media (prefers-reduced-motion: no-preference){
    .twinkle{ animation:tw 4s ease-in-out infinite; }
    .twinkle:nth-of-type(2n){ animation-duration:5.5s; animation-delay:-1.5s; }
    .twinkle:nth-of-type(3n){ animation-duration:6.8s; animation-delay:-3s; }
    @keyframes tw{ 0%,100%{opacity:1;} 50%{opacity:.5;} }
  }

  .overlay{ position:fixed; inset:0; z-index:50;
    background:radial-gradient(120% 120% at 50% 30%, #1c1c2b 0%, #0b0b12 100%);
    display:flex; align-items:center; justify-content:center; padding:24px;
    opacity:0; visibility:hidden; transition:opacity .35s ease, visibility .35s ease; }
  .overlay::before{ content:""; position:absolute; inset:0; opacity:.5;
    background-image:
      radial-gradient(1.5px 1.5px at 20% 30%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 70% 20%, #fff, transparent),
      radial-gradient(1px 1px at 40% 70%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 85% 60%, #fff, transparent),
      radial-gradient(1px 1px at 15% 80%, #fff, transparent),
      radial-gradient(1px 1px at 60% 88%, #fff, transparent); }
  .overlay.open{ opacity:1; visibility:visible; }

  .letter{ position:relative; z-index:1; width:min(560px,100%); max-height:88vh; overflow:auto;
    background:linear-gradient(#f6f2e8,#efe8d7); color:#33313a; border-radius:14px;
    padding:48px 34px 30px; box-shadow:0 30px 80px rgba(0,0,0,.55);
    transform:translateY(16px) scale(.96); opacity:0;
    transition:transform .4s cubic-bezier(.2,.8,.2,1), opacity .4s ease; border:1px solid rgba(0,0,0,.08); }
  .overlay.open .letter{ transform:none; opacity:1; }
  .letter .close{ position:absolute; top:12px; right:14px; width:40px; height:40px; border:none;
    border-radius:50%; background:transparent; color:#7a756a; font-size:30px; line-height:1; cursor:pointer;
    transition:background .2s,color .2s; }
  .letter .close:hover{ background:rgba(0,0,0,.06); color:#33313a; }
  .letter .crest{ text-align:center; color:var(--gold); font-size:24px; letter-spacing:8px; margin-bottom:14px; }
  .letter .quote{ font-size:clamp(24px,4.4vw,32px); line-height:1.42; font-style:italic; font-weight:500;
    text-align:center; color:#2c2b33; }
  .letter .quote::before{ content:"\201C"; }
  .letter .quote::after{ content:"\201D"; }
  .letter .attr{ text-align:center; margin-top:22px; font-size:16px; letter-spacing:.6px; color:#8a8272;
    text-transform:uppercase; }
  .letter .seal{ text-align:center; color:var(--gold); font-size:20px; margin-top:14px; }

  .hint{ position:fixed; left:0; right:0; bottom:16px; z-index:5; text-align:center;
    color:#5b5a5e; font-size:15px; letter-spacing:.4px; pointer-events:none; opacity:.85; }
</style>

    "6": { quote:"Tú serás para mí único en el mundo." },
    "7": { quote:"Es tan misterioso el país de las lágrimas." },
    "8": { quote:"Los mayores nunca comprenden nada por sí solos." },
    "9": { quote:"Caminando en línea recta no se puede llegar muy lejos." },
    "10": { quote:"Fue el tiempo que dedicaste a tu rosa lo que la hizo importante." }
  };
  var overlay=document.getElementById('overlay'),
      mQuote=document.getElementById('mQuote'),
      closeBtn=document.getElementById('closeBtn'), opener=null;
  function openQuote(id){ var d=quotes[id]; if(!d) return;
    mQuote.textContent=d.quote; overlay.classList.add('open');
    overlay.setAttribute('aria-hidden','false'); opener=document.activeElement; closeBtn.focus(); }
  function closeQuote(){ overlay.classList.remove('open'); overlay.setAttribute('aria-hidden','true');
    if(opener&&opener.focus) opener.focus(); }
  document.querySelectorAll('.star-link').forEach(function(el){
    el.addEventListener('click', function(){ openQuote(el.getAttribute('data-star')); });
    el.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); openQuote(el.getAttribute('data-star')); } });
  });
  closeBtn.addEventListener('click', closeQuote);
  overlay.addEventListener('click', function(e){ if(e.target===overlay) closeQuote(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeQuote(); });
</script>
</body>
</html>
